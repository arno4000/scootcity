{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Anmeldung</h2>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">E-Mail</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Passwort</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Account-Typ</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="account_type" value="user" checked>
          <label class="form-check-label">Fahrer</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="account_type" value="provider">
          <label class="form-check-label">Verleihanbieter</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <hr>
    <p class="mb-0">Noch kein Konto? <a href="{{ url_for('auth.register') }}">Register Fahrer</a></p>
    <p class="mb-0"><a href="{{ url_for('auth.provider_register') }}">Register Provider</a></p>
  </div>
</div>
{% endblock %}
